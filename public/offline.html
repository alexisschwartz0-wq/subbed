<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>You're offline | Subbed</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
        background: #f7f4f1;
        color: #0e0e0e;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .logo {
        font-weight: 800;
        font-size: 22px;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
      }
      .logo span {
        color: #9b6e7e;
      }
      h1 {
        font-size: 20px;
        margin: 0 0 8px;
      }
      p {
        color: rgba(14, 14, 14, 0.6);
        font-weight: 300;
        max-width: 320px;
        line-height: 1.6;
        margin: 0 0 24px;
      }
      button {
        border: none;
        border-radius: 999px;
        background: #9b6e7e;
        color: #f7f4f1;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover {
        background: #b8758a;
      }
    </style>
  </head>
  <body>
    <p class="logo">Sub<span>bed</span></p>
    <h1>You're offline</h1>
    <p>
      This page needs an internet connection. Reconnect and try again.
    </p>
    <button onclick="location.reload()">Try again</button>
  </body>
</html>
